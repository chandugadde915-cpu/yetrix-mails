services:
  backend:
    build:
      context: ./apps/backend
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB: ${MONGODB_DB:-yetrix_mail}
      MAILBOX_CREDENTIAL_ENCRYPTION_KEY: ${MAILBOX_CREDENTIAL_ENCRYPTION_KEY:-}
      MAILCOW_BASE_URL: ${MAILCOW_BASE_URL:-https://mail.yetrixtechnologies.com}
      MAILCOW_API_KEY: ${MAILCOW_API_KEY}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-yetrixtechnologies.com}
      MAIL_SERVER_IP: ${MAIL_SERVER_IP:-56.228.11.175}
      MAILCOW_DKIM_SELECTOR: ${MAILCOW_DKIM_SELECTOR:-dkim}
      MAIL_CLIENT_HOST: ${MAIL_CLIENT_HOST:-mail.yetrixtechnologies.com}
      MAIL_IMAP_HOST: ${MAIL_IMAP_HOST:-mail.yetrixtechnologies.com}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-993}
      MAIL_IMAP_SECURE: ${MAIL_IMAP_SECURE:-true}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-mail.yetrixtechnologies.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_SECURE: ${MAIL_SMTP_SECURE:-false}
      MAIL_SMTP_REQUIRE_TLS: ${MAIL_SMTP_REQUIRE_TLS:-true}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASS: ${MAIL_SMTP_PASS:-}
      MAIL_ATTACHMENT_DIR: ${MAIL_ATTACHMENT_DIR:-/app/storage/mail-attachments}
      LOCAL_MAIL_STORAGE_DIR: ${LOCAL_MAIL_STORAGE_DIR:-/app/storage}
      RATE_LIMIT_PER_WINDOW: ${RATE_LIMIT_PER_WINDOW:-240}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      PLAN_NAME: ${PLAN_NAME:-Launch}
      PLAN_LIMIT_DOMAINS: ${PLAN_LIMIT_DOMAINS:-3}
      PLAN_LIMIT_MAILBOXES: ${PLAN_LIMIT_MAILBOXES:-25}
      PLAN_LIMIT_ALIASES: ${PLAN_LIMIT_ALIASES:-100}
      PLAN_LIMIT_USERS: ${PLAN_LIMIT_USERS:-10}
      PLAN_LIMIT_STORAGE_MB: ${PLAN_LIMIT_STORAGE_MB:-25600}
    volumes:
      - ./storage:/app/storage
    ports:
      - "4000:4000"
