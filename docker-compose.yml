services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ownmail
      POSTGRES_USER: ownmail
      POSTGRES_PASSWORD: ownmail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/backend/src/config/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      APP_BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://ownmail:ownmail@postgres:5432/ownmail
      REDIS_URL: redis://redis:6379
      MAIL_HOSTNAME: mail.yourmailplatform.com
      WEBMAIL_URL: https://webmail.yourmailplatform.com
      DKIM_SELECTOR: default
    ports:
      - "4000:4000"

volumes:
  postgres-data:
