services:
  backend:
    image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/ownmail-backend:latest
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_BASE_URL: https://app.yourmailplatform.com
      MAIL_HOSTNAME: mail.yourmailplatform.com
      WEBMAIL_URL: https://webmail.yourmailplatform.com
      DKIM_SELECTOR: default
    ports:
      - "4000:4000"
